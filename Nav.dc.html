<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<header style="position:fixed;top:0;left:0;right:0;z-index:1000;background:{{ navBg }};border-bottom:{{ navBorder }};backdrop-filter:{{ navBlur }};-webkit-backdrop-filter:{{ navBlur }};box-shadow:{{ navShadow }};transition:background .45s ease, border-color .45s ease, box-shadow .45s ease, backdrop-filter .45s ease;font-family:'Hanken Grotesk',system-ui,sans-serif;">
  <div style="max-width:1340px;margin:0 auto;padding:0 30px;height:74px;display:flex;align-items:center;gap:26px;">
    <a href="Home.dc.html" style="display:flex;align-items:center;gap:12px;text-decoration:none;flex:none;">
      <img src="assets/aslan-logo.png" alt="Aslan FC crest" style="height:46px;width:auto;display:block;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.55));"/>
      <span style="font-weight:800;font-size:19px;letter-spacing:0.01em;color:#f4f4f3;line-height:1;">ASLAN&nbsp;<span style="color:#c9a24b;">FC</span></span>
    </a>
    <nav style="display:flex;align-items:center;gap:2px;margin-left:6px;flex:1;">
      <sc-for list="{{ links }}" as="lnk" hint-placeholder-count="9">
        <a href="{{ lnk.href }}" style="position:relative;text-decoration:none;color:{{ lnk.color }};font-size:12.5px;font-weight:600;letter-spacing:0.11em;padding:9px 11px;transition:color .25s ease;" style-hover="color:#e3c277;">
          {{ lnk.label }}
          <span style="position:absolute;left:11px;right:11px;bottom:1px;height:2px;border-radius:2px;background:#c9a24b;opacity:{{ lnk.barOpacity }};transition:opacity .3s ease;"></span>
        </a>
      </sc-for>
    </nav>
    <a href="Donate.dc.html" style="flex:none;display:inline-flex;align-items:center;gap:8px;text-decoration:none;background:linear-gradient(180deg,#e7c97e,#c9a24b);color:#1c1408;font-weight:800;font-size:13px;letter-spacing:0.05em;padding:11px 21px;border-radius:100px;box-shadow:0 6px 20px rgba(201,162,75,0.26);transition:transform .25s ease, box-shadow .25s ease;" style-hover="transform:translateY(-2px);box-shadow:0 12px 30px rgba(201,162,75,0.45);">
      DONATE <span style="color:#a8201f;font-size:13px;line-height:1;">&#9829;</span>
    </a>
  </div>
</header>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1340,&quot;height&quot;:74},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;home&quot;,&quot;about&quot;,&quot;teams&quot;,&quot;schedule&quot;,&quot;players&quot;,&quot;academy&quot;,&quot;news&quot;,&quot;sponsors&quot;,&quot;contact&quot;],&quot;default&quot;:&quot;home&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;solid&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;}}">
class Component extends DCLogic {
  state = { scrolled: false };
  componentDidMount() {
    this._onScroll = () => {
      const s = window.scrollY > 28;
      if (s !== this.state.scrolled) this.setState({ scrolled: s });
    };
    window.addEventListener('scroll', this._onScroll, { passive: true });
    this._onScroll();
  }
  componentWillUnmount() {
    window.removeEventListener('scroll', this._onScroll);
  }
  renderVals() {
    const active = this.props.active || 'home';
    const solid = !!this.props.solid || this.state.scrolled;
    const items = [
      ['home', 'HOME', 'Home.dc.html'],
      ['about', 'ABOUT', 'About.dc.html'],
      ['teams', 'TEAMS', 'Teams.dc.html'],
      ['schedule', 'SCHEDULE', 'Schedule.dc.html'],
      ['players', 'PLAYERS', 'Players.dc.html'],
      ['academy', 'ACADEMY', 'Academy.dc.html'],
      ['news', 'NEWS', 'News.dc.html'],
      ['sponsors', 'SPONSORS', 'Sponsors.dc.html'],
      ['contact', 'CONTACT', 'Contact.dc.html'],
    ];
    const links = items.map(([id, label, href]) => ({
      label, href,
      color: id === active ? '#e3c277' : 'rgba(244,244,243,0.74)',
      barOpacity: id === active ? 1 : 0,
    }));
    return {
      links,
      navBg: solid ? 'rgba(10,10,11,0.78)' : 'rgba(10,10,11,0)',
      navBorder: solid ? '1px solid rgba(255,255,255,0.08)' : '1px solid rgba(255,255,255,0)',
      navBlur: solid ? 'saturate(150%) blur(18px)' : 'blur(0px)',
      navShadow: solid ? '0 10px 34px rgba(0,0,0,0.4)' : '0 0 0 rgba(0,0,0,0)',
    };
  }
}
</script>
</body>
</html>
