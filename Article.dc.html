<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="crossorigin"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;background:#0a0a0b;color:#f4f4f3;font-family:'Hanken Grotesk',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  ::selection{background:rgba(201,162,75,0.3);color:#fff;}
</style>
</helmet>
<div style="background:#0a0a0b;overflow-x:hidden;">
  <dc-import name="Nav" active="news" solid="true" hint-size="100%,74px"></dc-import>

  <!-- ARTICLE HERO -->
  <section style="position:relative;padding:140px 30px 0;background:linear-gradient(180deg,#0f0f13,#0a0a0b);">
    <div style="max-width:820px;margin:0 auto;">
      <a href="News.dc.html" data-reveal="1" style="opacity:0;display:inline-flex;align-items:center;gap:8px;text-decoration:none;font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:0.14em;color:#9b9ba1;text-transform:uppercase;margin-bottom:28px;transition:color .2s ease;" style-hover="color:#e3c277;">← Back to newsroom</a>
      <div data-reveal="1" data-delay="60" style="opacity:0;font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:0.16em;color:#c9a24b;text-transform:uppercase;">{{ cat }} · {{ date }}</div>
      <h1 data-reveal="1" data-delay="120" style="opacity:0;margin:18px 0 0;font-size:clamp(34px,4.6vw,58px);line-height:1.06;font-weight:800;letter-spacing:-0.02em;color:#f4f4f3;">{{ title }}</h1>
      <div data-reveal="1" data-delay="200" style="opacity:0;margin:24px 0 0;display:flex;align-items:center;gap:14px;padding-bottom:36px;">
        <div style="width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#c9a24b,#8a6d2e);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#1c1408;">AF</div>
        <div><div style="font-size:14px;font-weight:700;color:#f4f4f3;">{{ author }}</div><div style="font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:0.08em;color:#86868c;text-transform:uppercase;">{{ readTime }}</div></div>
      </div>
    </div>
  </section>

  <!-- COVER -->
  <section style="max-width:1100px;margin:0 auto;padding:0 30px;">
    <div data-reveal="1" style="opacity:0;aspect-ratio:16/9;border-radius:22px;overflow:hidden;border:1px solid rgba(255,255,255,0.08);">
      <dc-import name="Placeholder" sid="article-cover" label="{{ cover }}" hint-size="100%,100%" style="width:100%;height:100%;display:block;"></dc-import>
    </div>
  </section>

  <!-- BODY -->
  <article style="max-width:720px;margin:0 auto;padding:56px 30px 30px;">
    <p data-reveal="1" style="opacity:0;margin:0 0 28px;font-size:21px;line-height:1.6;font-weight:500;color:#e6e6e8;">{{ lead }}</p>
    <sc-for list="{{ body }}" as="para" hint-placeholder-count="4">
      <p data-reveal="1" style="opacity:0;margin:0 0 22px;font-size:17px;line-height:1.75;color:#b4b4ba;">{{ para }}</p>
    </sc-for>
    <div data-reveal="1" style="opacity:0;margin-top:40px;padding-top:28px;border-top:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap;">
      <a href="News.dc.html" style="display:inline-flex;align-items:center;gap:8px;text-decoration:none;font-size:13px;font-weight:700;letter-spacing:0.05em;color:#e3c277;text-transform:uppercase;">← All news</a>
      <div style="display:flex;align-items:center;gap:10px;font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:0.1em;color:#6c6c72;text-transform:uppercase;">
        Share
        <sc-for list="{{ shares }}" as="s" hint-placeholder-count="3">
          <span style="width:34px;height:34px;border:1px solid rgba(255,255,255,0.12);border-radius:9px;display:flex;align-items:center;justify-content:center;color:#b4b4ba;cursor:pointer;font-size:11px;font-weight:700;transition:all .2s ease;" style-hover="border-color:rgba(201,162,75,0.5);color:#e3c277;">{{ s }}</span>
        </sc-for>
      </div>
    </div>
  </article>

  <!-- RELATED -->
  <section style="max-width:1340px;margin:0 auto;padding:60px 30px 100px;">
    <div data-reveal="1" style="opacity:0;margin-bottom:32px;font-family:'Geist Mono',monospace;font-size:12px;letter-spacing:0.2em;color:#c9a24b;text-transform:uppercase;">More from the newsroom</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:24px;">
      <sc-for list="{{ related }}" as="r" hint-placeholder-count="3">
        <a href="Article.dc.html?id={{ r.id }}" data-reveal="1" data-delay="{{ r.delay }}" style="opacity:0;text-decoration:none;background:#151518;border:1px solid rgba(255,255,255,0.07);border-radius:20px;overflow:hidden;display:block;transition:transform .28s ease, border-color .28s ease;" style-hover="transform:translateY(-5px);border-color:rgba(201,162,75,0.32);">
          <div style="overflow:hidden;aspect-ratio:16/10;">
            <dc-import name="Placeholder" sid="article-rel-{{ $index }}" label="{{ r.img }}" hint-size="100%,100%" style="width:100%;height:100%;display:block;"></dc-import>
          </div>
          <div style="padding:22px;">
            <div style="font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:0.16em;color:#c9a24b;text-transform:uppercase;">{{ r.cat }} · {{ r.date }}</div>
            <h3 style="margin:12px 0 0;font-size:18px;font-weight:700;line-height:1.3;color:#f4f4f3;">{{ r.title }}</h3>
          </div>
        </a>
      </sc-for>
    </div>
  </section>

  <dc-import name="Footer" hint-size="100%,420px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1340,&quot;height&quot;:1000}}">
class Component extends DCLogic {
  reveal(el) {
    if (el._r) return;
    el._r = true;
    const d = parseInt(el.getAttribute('data-delay') || '0', 10);
    const a = el._anim = el.animate(
      [{ opacity: 0, transform: 'translateY(22px)' }, { opacity: 1, transform: 'translateY(0)' }],
      { duration: 740, delay: d, easing: 'cubic-bezier(.2,.7,.2,1)', fill: 'both' }
    );
    a.onfinish = () => { el.style.opacity = '1'; el.style.transform = 'none'; };
  }
  setup() {
    const io = new IntersectionObserver((ents) => {
      ents.forEach((e) => { if (e.isIntersecting) { this.reveal(e.target); io.unobserve(e.target); } });
    }, { threshold: 0.1, rootMargin: '0px 0px -5% 0px' });
    document.querySelectorAll('[data-reveal]').forEach((el) => { if (!el._r) io.observe(el); });
  }
  componentDidMount() {
    requestAnimationFrame(() => requestAnimationFrame(() => this.setup()));
    this._t = setTimeout(() => this.setup(), 600);
    this._s = setTimeout(() => { document.querySelectorAll('[data-reveal]').forEach((el) => { if (el._r) return; const r = el.getBoundingClientRect(); if (r.top < window.innerHeight && r.bottom > 0) { if (el._anim) { try { el._anim.cancel(); } catch (e) {} } el.style.opacity = '1'; el.style.transform = 'none'; el._r = true; } }); }, 1800);
  }
  data() {
    return {
      'tryouts-2026': {
        cat: 'Club News', date: 'May 10, 2026', cover: 'TRYOUTS — SQUAD ON THE PITCH',
        title: 'Aslan FC announces open tryouts for the 2026 season',
        lead: 'The doors are open. Aslan FC is inviting players across Central Florida to compete for a place in the squad as the club prepares for its most ambitious season yet.',
        body: [
          'Registration is now live for first team, reserves, and academy tryouts. Sessions will run across multiple weekends in Orlando, giving every athlete a fair opportunity to be seen by our coaching staff.',
          'We are looking for players who embody the values of the club — excellence, discipline, integrity, and community. Technical ability matters, but so does character and a willingness to work for the badge.',
          '“This is how we build,” said founder and head coach Ruben Ramos. “We give talented, hungry players a real platform — and we develop them into the kind of footballers and people who lift everyone around them.”',
          'Spots are limited and competition is expected to be fierce. Players interested in attending can register through the contact page, and our team will follow up with dates, locations, and what to bring.',
        ],
      },
      'sponsorship-partner': {
        cat: 'Partnerships', date: 'May 5, 2026', cover: 'PARTNERSHIP ANNOUNCEMENT',
        title: 'Welcome our newest sponsorship partner to the family',
        lead: 'Aslan FC is proud to welcome a new local partner whose support will directly fund player development and community programs.',
        body: [
          'Partnerships like this are the foundation of a sustainable club. They allow us to invest in coaching, equipment, and field time — the things that turn potential into performance.',
          'As a community-first club, every partnership we form is rooted in shared values. Our new partner believes in giving young athletes a pathway, and that belief aligns perfectly with our mission.',
          'Supporters will see the partnership featured across our kit, matchday banners, and social channels throughout the season. We could not be more excited to grow together.',
        ],
      },
      'lakeland-recap': {
        cat: 'Match Recap', date: 'Apr 30, 2026', cover: 'MATCH ACTION — HOME WIN',
        title: 'Aslan FC 3–1 Lakeland: a statement win at home',
        lead: 'A dominant second-half display saw the lions roar past Lakeland in front of a packed home crowd, sending a clear message to the rest of the league.',
        body: [
          'The first half was a tight, physical battle, with both sides trading chances. Aslan FC took the lead through a composed finish before Lakeland levelled just before the break.',
          'After the restart, the lions found another gear. Two quick goals in ten minutes turned the game decisively, and the home support roared the team on as they controlled the closing stages.',
          '“The character this group showed today is exactly what we are building,” said coach Ramos. “We stayed calm, we trusted our work, and we were ruthless when it mattered.”',
          'The result lifts the club up the table as the season heads into a crucial run of fixtures.',
        ],
      },
      'youth-clinic': {
        cat: 'Community', date: 'Apr 22, 2026', cover: 'YOUTH SKILLS CLINIC',
        title: 'Players give back with a free youth clinic',
        lead: 'First team players spent the afternoon coaching the next generation, hosting a free skills clinic for local kids as part of our community commitment.',
        body: [
          'Dozens of young players turned out for an afternoon of drills, small-sided games, and plenty of laughs. For many, it was their first chance to train alongside the players they watch on matchdays.',
          'Community is one of the four pillars of Aslan FC, and events like this are at the heart of who we are. We believe the club has a responsibility to strengthen the neighborhoods it represents.',
          'Plans are already underway to make the clinic a regular fixture on the calendar, with more sessions to be announced soon.',
        ],
      },
      'academy-graduates': {
        cat: 'Academy', date: 'Apr 15, 2026', cover: 'ACADEMY GRADUATES DEBUT',
        title: 'Three academy graduates earn first team minutes',
        lead: 'The pathway works. Three homegrown players made their senior debuts this month — proof that the academy vision is already bearing fruit.',
        body: [
          'When the club was founded, the promise was simple: build a genuine route from grassroots to the first team. Seeing academy players step onto the senior pitch is that promise becoming reality.',
          'All three players have come through the program, developing their technical ability, game intelligence, and physicality under the guidance of our coaching staff.',
          '“There is no better feeling than watching a player you have developed make their debut,” said the academy director. “This is only the beginning.”',
        ],
      },
      'new-kit': {
        cat: 'Club News', date: 'Apr 8, 2026', cover: 'NEW HOME KIT REVEAL',
        title: 'New home kit revealed for the season ahead',
        lead: 'Black and gold, reimagined. Take a first look at the kit the lions will wear as they chase promotion this campaign.',
        body: [
          'The new home kit honors the identity of the club — bold, fierce, and unmistakably Aslan FC. The crest sits proudly at the heart, framed by the colors that define the pride.',
          'Designed with both players and supporters in mind, the kit blends a modern athletic cut with the timeless black-and-gold palette that has become synonymous with the club.',
          'Kits will be available to supporters ahead of the new season. Keep an eye on our channels for release details.',
        ],
      },
      'coach-interview': {
        cat: 'Interview', date: 'Apr 1, 2026', cover: 'COACH RAMOS — INTERVIEW',
        title: 'Coach Ramos on building a culture, not just a team',
        lead: 'Our founder sits down to talk philosophy, ambition, and what the crest really means to the people who wear it.',
        body: [
          '“A team is eleven players. A culture is everyone — the staff, the families, the community,” Ramos explains. “We are building the second one, because that is what lasts.”',
          'For Ramos, success is measured in more than results. It is in the leaders the club produces, the opportunities it creates, and the legacy it leaves for the next generation.',
          '“Every player who comes through here should leave a better footballer and a better person. If we do that, the wins will come — and they will mean something.”',
          'It is a vision rooted in patience and belief, and it is already taking shape on and off the field.',
        ],
      },
    };
  }
  renderVals() {
    const all = this.data();
    let id = 'tryouts-2026';
    try { id = new URLSearchParams(window.location.search).get('id') || id; } catch (e) {}
    const art = all[id] || all['tryouts-2026'];
    const order = ['tryouts-2026', 'sponsorship-partner', 'lakeland-recap', 'youth-clinic', 'academy-graduates', 'new-kit', 'coach-interview'];
    const related = order.filter((k) => k !== id).slice(0, 3).map((k, i) => ({
      id: k, cat: all[k].cat, date: all[k].date, title: all[k].title, img: all[k].cover, delay: String(i * 100),
    }));
    return {
      cat: art.cat, date: art.date, title: art.title, cover: art.cover,
      lead: art.lead, body: art.body, author: 'Aslan FC', readTime: '3 min read',
      shares: ['IG', 'FB', 'X'],
      related,
    };
  }
}
</script>
</body>
</html>
